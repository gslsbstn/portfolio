name: Deploy website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Verify private key format
        shell: bash
        run: |
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

      - name: Test SSH
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes ${{ secrets.USERNAME }}@${{ secrets.HOST }} "echo connected"

      - name: Deploy
        shell: bash
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            --exclude ".git" \
            --exclude ".github" \
            ./ \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/portfolio.geissel.io/html/